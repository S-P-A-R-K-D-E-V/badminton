apiVersion: apps/v1
kind: Deployment
metadata:
  name: badminton-app
  namespace: default
  labels:
    app: badminton
spec:
  replicas: 1
  selector:
    matchLabels:
      app: badminton
  template:
    metadata:
      labels:
        app: badminton
    spec:
      containers:
        - name: app
          image: ghcr.io/YOUR_ORG/badminton-app:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: badminton-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/sessions
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/sessions
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: badminton-svc
  namespace: default
spec:
  selector:
    app: badminton
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: badminton-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - badminton.yourdomain.com
      secretName: badminton-tls
  rules:
    - host: badminton.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: badminton-svc
                port:
                  number: 80
