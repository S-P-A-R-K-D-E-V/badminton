name: Build & Push

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: satthuno99/badminton-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps image tag
        uses: actions/checkout@v4
        with:
          repository: S-P-A-R-K-D-E-V/spark-infra
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Patch deployment image tag
        run: |
          sed -i "s|satthuno99/badminton-app:.*|satthuno99/badminton-app:${{ github.sha }}|g" \
            gitops/k8s/apps/badminton/deployment.yaml
          cd gitops
          git config user.email "ci@spark.dev"
          git config user.name "CI Bot"
          git add k8s/apps/badminton/deployment.yaml
          git commit -m "chore: update badminton image to ${{ github.sha }}" || exit 0
          git push
